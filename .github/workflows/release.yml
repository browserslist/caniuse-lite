name: Release
on:
  workflow_run:
    workflows: ['Check']
    types:
      - completed
jobs:
  check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      release: ${{ steps.marker.outcome }}
    steps:
      - name: Download release marker
        id: marker
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: should_release
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
  publish:
    needs: check
    if: needs.check.outputs.release == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Clean npm package
        uses: ai/clean-npm-project@29219e611c2da08a07cb0a6a1b965c162e5940a9 # v0.3.0
        with:
          clean-docs: true
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
      - name: Publish npm package
        run: npm publish --provenance
        working-directory: cleaned-project/
