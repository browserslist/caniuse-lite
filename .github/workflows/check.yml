name: Check
on:
  push:
    branches:
      - main
  schedule:
    - cron: '41 * * * *'
permissions:
  contents: write
jobs:
  publish:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            *.sigstore.dev:443
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
      - name: Check caniuse-db version
        id: caniuse
        run: node ./check.js
      - name: Check @mdn/browser-compat-data version
        if: steps.caniuse.outputs.newVersion
        run: node ./check-mdn-bcd.js
      - name: Setup git config
        if: steps.caniuse.outputs.newVersion
        run: |
          git config user.name "Auto-Updater"
          git config user.email "<andrey@sitnik.es>"
      - name: Install dependencies
        if: steps.caniuse.outputs.newVersion
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Copy MDN data
        if: steps.caniuse.outputs.newVersion
        run: node ./copy-mdn.js
      - name: Pack Can I Use data
        if: steps.caniuse.outputs.newVersion
        run: pnpm run pack
      - name: Run tests
        if: steps.caniuse.outputs.newVersion
        run: pnpm test:unit
      - name: Commit changes
        if: steps.caniuse.outputs.newVersion
        run: node ./commit.js
      - name: Push changes
        if: steps.caniuse.outputs.newVersion
        run: git push --follow-tags
      - name: Write release marker
        if: steps.caniuse.outputs.newVersion
        run: echo true > should_release
      - name: Upload release marker
        if: steps.caniuse.outputs.newVersion
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: should_release
          path: should_release
