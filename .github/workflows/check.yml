name: Check
on:
  push:
    branches:
      - main
  schedule:
    - cron: '41 * * * *'
permissions:
  contents: write
  id-token: write
jobs:
  publish:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            *.sigstore.dev:443
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
      - name: Check caniuse-db version
        id: caniuse
        run: node ./check.js
      - name: Check @mdn/browser-compat-data version
        if: steps.caniuse.outputs.newVersion
        run: node ./check-mdn-bcd.js
      - name: Setup git config
        if: steps.caniuse.outputs.newVersion
        run: |
          git config user.name "Auto-Updater"
          git config user.email "<andrey@sitnik.es>"
      - name: Install dependencies
        if: steps.caniuse.outputs.newVersion
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Copy MDN data
        if: steps.caniuse.outputs.newVersion
        run: node ./copy-mdn.js
      - name: Pack Can I Use data
        if: steps.caniuse.outputs.newVersion
        run: pnpm run pack
      - name: Run tests
        if: steps.caniuse.outputs.newVersion
        run: pnpm test:unit
      - name: Commit changes
        if: steps.caniuse.outputs.newVersion
        run: node ./commit.js
      - name: Publish
        if: steps.caniuse.outputs.newVersion
        run: ./node_modules/.bin/clean-publish -- --provenance &> publish.log
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Check npm log
        if: steps.caniuse.outputs.newVersion
        run: node ./log.js
      - name: Push changes
        if: steps.caniuse.outputs.newVersion
        run: git push --follow-tags
